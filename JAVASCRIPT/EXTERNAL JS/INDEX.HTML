<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Button Hover Example</title>
    <style>
        button {
            padding: 12px 20px;
            font-size: 16px;
            background-color: royalblue;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <h1>Hover Over the Button</h1>
    <button id="myButton">Hover Me</button>

    <!-- Link external JavaScript file -->
    <script src="script.js"></script>

</body>
</html>
